</main>
<script>
        // Micro-interaction for a floating particle effect in the brand side
        const canvas = document.getElementById('particle-canvas');
        if (canvas) {
            const createParticle = () => {
                const p = document.createElement('div');
                p.className = 'absolute bg-primary-fixed-dim rounded-full pointer-events-none opacity-0';
                const size = Math.random() * 6 + 2;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.top = `${Math.random() * 100}%`;
                canvas.appendChild(p);

                const animation = p.animate([
                    { transform: 'translateY(0) scale(1)', opacity: 0 },
                    { opacity: 0.6, offset: 0.2 },
                    { transform: 'translateY(-100px) scale(0)', opacity: 0 }
                ], {
                    duration: Math.random() * 4000 + 3000,
                    easing: 'ease-out'
                });

                animation.onfinish = () => p.remove();
            };

            setInterval(createParticle, 300);
        }
    </script>
