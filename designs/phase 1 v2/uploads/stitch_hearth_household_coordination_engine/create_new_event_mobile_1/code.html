<script>
        // Micro-interaction for primary button
        const createBtn = document.querySelector('button.bg-primary');
        createBtn.addEventListener('click', () => {
            createBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Creating...';
            setTimeout(() => {
                createBtn.innerHTML = '<span class="material-symbols-outlined">done_all</span> Done!';
                createBtn.classList.replace('bg-primary', 'bg-secondary');
            }, 1000);
        });

        // Toggle state styling
        const checkboxes = document.querySelectorAll('.toggle-checkbox');
        checkboxes.forEach(cb => {
            cb.addEventListener('change', (e) => {
                const parent = e.target.closest('div.bg-surface-container-low');
                if(e.target.checked) {
                    parent.classList.add('border-primary/40');
                    parent.classList.replace('bg-surface-container-low', 'bg-primary-fixed/20');
                } else {
                    parent.classList.remove('border-primary/40');
                    parent.classList.replace('bg-primary-fixed/20', 'bg-surface-container-low');
                }
            });
        });
    </script>
