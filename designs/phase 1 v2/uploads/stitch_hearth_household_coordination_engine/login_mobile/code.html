</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">

</div>

<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary py-4 rounded-xl font-headline-md text-on-primary shadow-md hover:bg-primary-container transition-all active:scale-95 flex items-center justify-center gap-2 group" type="submit">
                Enter the Hearth
                <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</form>
<p class="mt-8 font-body-md text-on-surface-variant">
            New to the family? <a class="text-primary font-bold hover:underline" href="#">Join Hestia</a>
</p>

<script>
        // Micro-interaction for the password toggle
        const toggleBtn = document.querySelector('form button[type="button"]');
        const passInput = document.getElementById('password');
        const icon = toggleBtn.querySelector('.material-symbols-outlined');

        toggleBtn.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            icon.textContent = isPass ? 'visibility_off' : 'visibility';
        });

        // Subtle parallax/tilt effect on the login card
        const card = document.querySelector('main');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
    </script>
