schema: http://localhost:8080/graphql
documents: 'src/**/*.graphql'
generates:
  src/__generated__/graphql.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-urql
    config:
      withHooks: true
      enumsAsTypes: true
      skipTypename: false
      scalars:
        DateTime: string
        UUID: string
        Email: string
        Date: string
        URL: string
